# =============================================================================
# OTA — Expo Updates (TDD Part 5 §2.4, ADR-024). JS-only, store-policy-compliant
# changes ship to Expo Updates channels for fast fixes. NO native-module / config-
# plugin changes via OTA (TRISK-10). Every OTA is tied to a runtime version; rollouts
# are staged and monitored (Sentry crash-free), auto-rollback on a crash spike.
# Manual dispatch so OTA is a deliberate action, not every merge.
#
# Hardening (2026-07-12): least-privilege permissions, preflight fail-fast, and the
# Environment name aligned to CD (staging/production, finding OTA-1). The update
# message no longer relies on head_commit (empty on dispatch) — it uses the SHA.
# The publish STEP stays a scaffold (echo) until EAS is provisioned.
# =============================================================================
name: OTA

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Expo Updates channel'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

permissions:
  contents: read

jobs:
  publish-ota:
    name: Publish Expo Update
    runs-on: ubuntu-latest
    environment: ${{ inputs.channel }}
    steps:
      - uses: actions/checkout@v4
      - name: Preflight (fail fast on missing config)
        run: bash scripts/preflight.sh "${{ inputs.channel }}"
        env:
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
      # Previously `echo "eas update ..."`, which reported SUCCESS — so dispatching this
      # looked like an OTA had shipped to users while nothing was published. Fails closed
      # instead. Preflight above still validates the channel's configuration first.
      #
      # To implement (B7): `eas update --channel <channel> --message "OTA <sha>"`, with
      # runtime-version binding and the crash-spike auto-rollback policy (TDD §3.4).
      # Build profiles and channels now exist in apps/mobile/eas.json; what is missing is
      # EXPO_ACCESS_TOKEN and a published build for the channel to update.
      - name: OTA publish is not implemented
        run: |
          echo "::error::OTA publish is NOT implemented. Nothing was published to '${{ inputs.channel }}'."
          echo "Preflight passed, so the channel's configuration is present — but the"
          echo "'eas update' step does not exist yet (B7)."
          exit 1
