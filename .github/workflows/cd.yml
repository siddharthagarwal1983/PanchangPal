# =============================================================================
# CD — deploy on merge to main
# =============================================================================

name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  migrate-staging:
    name: Apply DB migrations → staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Preflight
        run: bash scripts/preflight.sh staging
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      - name: Apply migrations
        run: bash scripts/migrate.sh "$SUPABASE_STAGING_DB_URL"
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}

      - name: Summary
        if: always()
        run: |
          echo "### Staging migrations: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-functions:
    name: Deploy Edge Functions (SVC_*) → staging
    runs-on: ubuntu-latest
    needs: migrate-staging
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.33.9

      - name: Preflight
        run: bash scripts/preflight.sh staging
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      # Functions are declared in supabase/config.toml with explicit entrypoints
      # (sources live under apps/backend/functions). Deploy them by name so the CLI
      # uses those entrypoints + import maps rather than the empty default dir.
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy \
            account ask-guru content-ingest notify-scheduler panchang revenuecat-webhook sync \
            --project-ref "$SUPABASE_STAGING_REF"
        env:
          SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  e2e-staging:
    name: Maestro E2E (FLOW_*) on staging
    runs-on: ubuntu-latest
    needs: deploy-functions

    steps:
      - uses: actions/checkout@v5

      # Replace with actual Maestro installation later
      - name: Placeholder E2E
        run: |
          echo "maestro test tests/flows"

  eas-build:
    name: EAS build → internal distribution
    runs-on: ubuntu-latest
    needs: e2e-staging
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preflight
        run: bash scripts/preflight.sh staging
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      # Replace with actual Expo CLI build once configured
      - name: Placeholder EAS build
        run: |
          echo "eas build --platform all --profile staging --non-interactive"
        env:
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

  promote-production:
    name: Promote to production (manual go/no-go §10.1)
    runs-on: ubuntu-latest
    needs: eas-build
    environment: production
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Preflight
        run: bash scripts/preflight.sh production
        env:
          SUPABASE_PROD_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      - name: Production deployment placeholder
        run: |
          echo "Apply production migrations"
          echo "Deploy Edge Functions"
          echo "Submit production EAS build"

      - name: Summary
        if: always()
        run: |
          echo "### Production promotion: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"