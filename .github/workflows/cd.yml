# =============================================================================
# CD — deploy on merge to main
# =============================================================================

name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  migrate-staging:
    name: Apply DB migrations → staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Preflight
        run: bash scripts/preflight.sh staging
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      - name: Apply migrations
        run: bash scripts/migrate.sh "$SUPABASE_STAGING_DB_URL"
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}

      # Staging carried schema but no data — every table returned zero rows, so the app
      # showed empty states everywhere and the Ritual screen had no ritual to render.
      # §1.1 specifies staging holds anonymized/synthetic data, so this was a gap.
      #
      # Safe to re-run on every deploy: seed.sql is `on conflict do nothing` throughout.
      # It seeds structure only (traditions, feature-flag defaults, one representative
      # ritual/festival/checklist); reviewer-approved content still arrives via
      # SVC_content_ingest, never raw-seeded (TDD Part 2 §6.2).
      #
      # Staging ONLY. Production is promoted separately and must never be seeded with
      # synthetic rows.
      - name: Seed staging data
        run: psql "$SUPABASE_STAGING_DB_URL" -v ON_ERROR_STOP=1 -f apps/backend/seed/seed.sql
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}

      - name: Summary
        if: always()
        run: |
          echo "### Staging migrations + seed: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-functions:
    name: Deploy Edge Functions (SVC_*) → staging
    runs-on: ubuntu-latest
    needs: migrate-staging
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.33.9

      # The Deno import map resolves @panchangpal/shared + /ai to their built dist
      # (Deno cannot rewrite the packages' TS-ESM '.js' specifiers to '.ts'), so build
      # them before deploy. dist/ is git-ignored, so this must run in CD.
      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Build shared + ai packages (for Deno import map)
        run: pnpm build --filter=@panchangpal/shared --filter=@panchangpal/ai

      - name: Preflight
        run: bash scripts/preflight.sh staging
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      # Functions are declared in supabase/config.toml with explicit entrypoints
      # (sources live under apps/backend/functions). Deploy them by name so the CLI
      # uses those entrypoints + import maps rather than the empty default dir.
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy \
            account ask-guru content-ingest notify-scheduler panchang revenuecat-webhook sync \
            --project-ref "$SUPABASE_STAGING_REF"
        env:
          SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ---------------------------------------------------------------------------
  # DE-DECLARED JOBS (2026-07-18, B3)
  #
  # `e2e-staging` and `eas-build` ran `echo` and reported success on every push to
  # main, making CD's green status claim verification that never happened. Removed
  # rather than left in place — the same reasoning that removed two hollow CI gates
  # (see ci.yml → DE-DECLARED GATES): a job that cannot fail reads as coverage.
  #
  #   e2e-staging  ran `echo "maestro test tests/flows"`. tests/flows/ contains only
  #                .gitkeep and there is no .maestro/. Restore in B2 with real FLOW_*
  #                specs — which additionally require an installable build artifact,
  #                so B2 depends on B3 completing.
  #
  #   eas-build    RESTORED below as a real build (2026-07-19), once profiles, store
  #                identifiers, EXPO_ACCESS_TOKEN, and two successful manual Android
  #                builds existed to prove the process works.
  #
  # The manual-dispatch jobs (promote-production here, publish-ota in ota.yml) are
  # NOT removed: a deploy job that silently reports success is worse than a missing
  # one, because an operator can believe a promotion happened. They now fail loudly
  # instead. See the explicit failure step below.
  # ---------------------------------------------------------------------------

  eas-build:
    name: EAS build (Android) → internal distribution
    runs-on: ubuntu-latest
    needs: deploy-functions
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preflight
        run: bash scripts/preflight.sh staging
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      # ANDROID ONLY, deliberately. iOS signing needs an Apple Developer membership that
      # does not exist yet, so `--platform all` would fail on the iOS half of every run.
      # Add ios once the membership and credentials are in place (B3 remainder).
      #
      # `--wait` (the default) is the point: without it the job reports success as soon as
      # the build is QUEUED, which would make this another job that cannot fail — exactly
      # what was removed from CD this morning. It costs ~15-20 min of wall clock and one
      # EAS build credit per merge to main. If that pressure becomes a problem, the honest
      # alternatives are to trigger on release tags or on workflow_dispatch — NOT to add
      # --no-wait, which restores the appearance of verification without the substance.
      #
      # EXPO_PUBLIC_* are not passed here: they live in the EAS "preview" environment,
      # which apps/mobile/eas.json binds to the staging profile.
      - name: EAS build (Android, staging profile)
        working-directory: apps/mobile
        run: pnpm dlx eas-cli@latest build --platform android --profile staging --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "### EAS Android build: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts: https://expo.dev/accounts/siddharth2008/projects/panchangpal/builds" >> "$GITHUB_STEP_SUMMARY"

  promote-production:
    name: Promote to production (manual go/no-go §10.1)
    runs-on: ubuntu-latest
    needs: deploy-functions
    environment: production
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Preflight
        run: bash scripts/preflight.sh production
        env:
          SUPABASE_PROD_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      # This job previously echoed three lines and reported SUCCESS, so dispatching it
      # looked like a completed production promotion while deploying nothing. It now
      # fails closed. Preflight above still runs first, so a missing production secret
      # is reported before this point.
      #
      # To implement (B7/B8): apply migrations with scripts/migrate.sh against
      # SUPABASE_PROD_DB_URL, deploy Edge Functions with --project-ref SUPABASE_PROD_REF,
      # and submit the production build via `eas submit --profile production`.
      - name: Production promotion is not implemented
        run: |
          echo "::error::Production promotion is NOT implemented. Nothing was deployed."
          echo "Preflight passed, so production configuration is present — but the"
          echo "migrate / deploy / submit steps do not exist yet (B7/B8)."
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "### Production promotion: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"