# =============================================================================
# CI — PR gates (TDD Part 5 §2.1/§2.2, ADR-024). Release-blocking: a red gate
# blocks merge. Current sequence:
#   lint + typecheck → bundle (expo export) → unit/component/a11y → RLS policy →
#   secret scan → dependency scan.
#
# Every job here can actually fail. Two documented gates (api/zod contract, AI
# eval subset) were de-declared in B1 because they could not — see the
# DE-DECLARED GATES block below for what must be built to restore them.
#
# Hardening (2026-07-12, behavior-preserving): least-privilege permissions,
# version pins sourced from workflow env (no per-job duplication), pnpm install
# retries, db-tests + security-scan toolchain setup, and job step summaries.
# What the pipeline validates is unchanged.
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege: CI only needs to read the repo (gitleaks needs full history).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.11.0'
  PNPM_VERSION: '9.6.0'

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - name: Install (with retry)
        run: |
          n=0; until pnpm install --frozen-lockfile; do
            n=$((n+1)); [ "$n" -ge 3 ] && { echo "::error::pnpm install failed after $n attempts"; exit 1; }
            echo "::warning::pnpm install failed (attempt $n) — retrying in $((n*5))s"; sleep $((n*5));
          done
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Summary
        if: always()
        run: |
          echo "### Lint + Typecheck: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  unit-component-a11y:
    name: Unit + Component + Accessibility
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - name: Install (with retry)
        run: |
          n=0; until pnpm install --frozen-lockfile; do
            n=$((n+1)); [ "$n" -ge 3 ] && { echo "::error::pnpm install failed after $n attempts"; exit 1; }
            echo "::warning::pnpm install failed (attempt $n) — retrying in $((n*5))s"; sleep $((n*5));
          done
      # Vitest logic suites (Edge Function conflict rules, RC mapping, merge/deletion,
      # panchang cache key, retrieval confidence gate). Component/a11y tests (jest-expo)
      # run per-app and are release-blocking (ADR-029).
      - run: pnpm test
      - run: pnpm --filter @panchangpal/ui test
      - run: pnpm --filter @panchangpal/mobile test
      - name: Summary
        if: always()
        run: |
          echo "### Unit + Component + a11y: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  bundle:
    name: Bundle (expo export, ios + android)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - name: Install (with retry)
        run: |
          n=0; until pnpm install --frozen-lockfile; do
            n=$((n+1)); [ "$n" -ge 3 ] && { echo "::error::pnpm install failed after $n attempts"; exit 1; }
            echo "::warning::pnpm install failed (attempt $n) — retrying in $((n*5))s"; sleep $((n*5));
          done
      # Compiles every module through Metro for both platforms. This is the only gate that
      # executes the app's real entrypoint: lint, typecheck, and jest all pass without ever
      # invoking Metro, which is how three bundle-blocking defects reached M8 undetected
      # (see CURRENT_MILESTONE.md → Execution Gap). Deliberately needs no secrets —
      # EXPO_PUBLIC_* are absent here and the export must still succeed.
      - name: Export iOS + Android bundles
        working-directory: apps/mobile
        run: pnpm exec expo export --platform all --output-dir "$RUNNER_TEMP/expo-export"
      - name: Summary
        if: always()
        run: |
          echo "### Bundle (expo export): ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # DE-DECLARED GATES (2026-07-18, B1)
  #
  # Two jobs were removed because they reported green while verifying nothing —
  # worse than an absent gate, because a green check reads as coverage. This is
  # the same mechanism that let six defects reach M8 behind a fully green CI
  # (see .claude/CURRENT_MILESTONE.md → Execution Gap).
  #
  #   api-contract    ran `vitest run packages/api --passWithNoTests` against a
  #                   package containing zero test files. Redundant once real
  #                   ones exist: this root vitest config already includes
  #                   `packages/**/*.test.ts`, so contract tests added under
  #                   packages/api will run in `unit-component-a11y` with no
  #                   workflow change. What is still MISSING is the tests
  #                   themselves — packages/api/src/contracts/* validating zod
  #                   schemas against docs/api/openapi.yaml (ADR-032).
  #
  #   ai-eval-subset  ran `echo "AI eval subset runs once the TDD Part 3 harness
  #                   is in place."` and passed in 5s. Restore as a real job when
  #                   the refusal + golden-set harness lands (TDD Part 3 §9.4);
  #                   AI regressions must block merge (ADR-029).
  #
  # Do not re-add either as a placeholder. A gate is added when it can fail.
  # ---------------------------------------------------------------------------

  db-tests:
    name: RLS policy + DB integration suites (§4.4 security gate)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg15 # pgvector + pgtap-capable base for the migrations
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      # Finding CI-1 fix: the runner needs a Postgres client (psql) + pgTAP's pg_prove.
      - name: Install Postgres client + pgTAP (pg_prove)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client libtap-parser-sourcehandler-pgtap-perl
      # The pgvector service image ships pgvector but not the pgTAP server extension, so the suites'
      # `CREATE EXTENSION pgtap` fails. Install postgresql-15-pgtap into the running service
      # container (Debian/PGDG-based) so the extension's control files are available server-side.
      - name: Install pgTAP into the Postgres service container
        run: |
          CID=$(docker ps --format '{{.ID}} {{.Image}}' | grep -i 'pgvector' | awk '{print $1}' | head -n1)
          if [ -z "$CID" ]; then echo "::error::could not find the postgres service container"; docker ps; exit 1; fi
          echo "postgres service container: $CID"
          docker exec -u root "$CID" bash -lc "apt-get update && apt-get install -y postgresql-15-pgtap"
      # Create the extension up front: the suites call plan() before their own CREATE EXTENSION,
      # so pgTAP must already exist in the DB when pg_prove loads each file.
      - name: Enable pgTAP extension
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgtap;"
      - name: Preflight (CI DB prerequisites)
        run: bash scripts/preflight.sh ci || true # advisory in CI; does not gate the suite
      # The bare Postgres service lacks Supabase's managed auth schema + roles, which the
      # migrations FK/GRANT against and the RLS suite relies on (auth.uid, SET ROLE). Stand up
      # a CI-only equivalent before migrating. Never runs against a real Supabase project.
      - name: Bootstrap Supabase-managed schema + roles (CI only)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/ci-db-bootstrap.sql
      # Apply all migrations (incl. AI operational + retrieval RPC), then run both pgTAP
      # suites: RLS policies (cross-user/household denial, service-only, F-21) and DB
      # integration (idempotent upserts, household entitlement, merge, AI helpers).
      - name: Apply migrations
        run: bash scripts/migrate.sh "$DATABASE_URL"
      - name: Run pgTAP suites
        run: pg_prove -d "$DATABASE_URL" apps/backend/tests/rls/*.test.sql apps/backend/tests/integration/*.test.sql
      - name: Summary
        if: always()
        run: |
          echo "### DB / RLS suites: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  security-scan:
    name: Secret + dependency scan
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action@v2 now requires a token to scan PRs (breaking change).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Finding CI-2 fix: set up Node + pnpm (with cache) instead of relying on ambient node.
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - name: Install (with retry)
        run: |
          n=0; until pnpm install --frozen-lockfile; do
            n=$((n+1)); [ "$n" -ge 3 ] && exit 1; sleep $((n*5));
          done
      - name: Dependency audit
        run: pnpm audit --audit-level=high || true
