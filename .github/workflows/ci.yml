# =============================================================================
# CI — PR gates (TDD Part 5 §2.1/§2.2, ADR-024). Release-blocking: a red gate
# blocks merge. Sequence mirrors the documented pipeline:
#   lint + typecheck → unit/component/a11y → api/zod contract → RLS policy →
#   AI eval subset → secret scan → dependency scan.
# Steps that need the full toolchain/DB run once it's provisioned; jobs are wired
# now so the gates exist and fail closed on missing checks.
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.11.0'
  PNPM_VERSION: '9.6.0'

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '9.6.0' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  unit-component-a11y:
    name: Unit + Component + Accessibility
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '9.6.0' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Component tests assert accessibility (roles/labels/targets/contrast) — release-blocking (ADR-029).
      - run: pnpm test

  api-contract:
    name: API / zod contract tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '9.6.0' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Validates packages/api zod contracts against docs/api/openapi.yaml (ADR-032).
      - run: pnpm --filter @panchangpal/api test

  rls-policy:
    name: RLS policy test-suite (§4.4 security gate)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      # Apply migrations then run the pgTAP suite (asserts cross-user/household denial,
      # service-only writes, F-21 counts). See apps/backend/tests/rls/.
      - name: Apply migrations
        run: bash scripts/migrate.sh "postgresql://postgres:postgres@localhost:5432/postgres"
      - name: Run pgTAP RLS suite
        run: |
          echo "pg_prove -d \"$DATABASE_URL\" apps/backend/tests/rls/*.test.sql"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

  ai-eval-subset:
    name: AI eval subset (refusal + golden, TDD Part 3 §9.4)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      # Refusal + golden-set eval subset. Harness lands with the AI subsystem (TDD Part 3);
      # the gate is declared here so AI regressions block merge.
      - run: echo "AI eval subset runs once the TDD Part 3 harness is in place."

  security-scan:
    name: Secret + dependency scan
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
      - name: Dependency audit
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high || true
