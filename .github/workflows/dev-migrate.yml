# =============================================================================
# Dev environment — apply migrations + seed (TDD Part 5 §1.1, §2.5).
#
# §1.1 mandates three isolated Supabase projects with no shared databases, and
# migrations that promote dev -> staging -> prod. The dev project was provisioned on
# 2026-07-18 (ref in SUPABASE_DEV_REF); this is how it is brought up to date.
#
# MANUAL ONLY. Unlike staging — which CD migrates on every merge to main — dev is an
# integration sandbox. Migrating it automatically would fight with whatever a developer is
# doing there. Run it deliberately, usually before promoting a migration to staging.
#
# SUPABASE_DEV_DB_URL contains a database password and is a write-only GitHub secret by
# design: it is never fetched to a workstation, so the value cannot be pasted, logged, or
# leaked by hand. Running migrations through CI is what keeps that true.
# =============================================================================

name: Dev migrate + seed

on:
  workflow_dispatch:
    inputs:
      seed:
        description: 'Apply seed.sql after migrating'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: dev-migrate
  cancel-in-progress: false

jobs:
  migrate-dev:
    name: Apply migrations → dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      # Fails closed on any missing dev secret before touching the database.
      - name: Preflight
        run: bash scripts/preflight.sh dev
        env:
          SUPABASE_DEV_DB_URL: ${{ secrets.SUPABASE_DEV_DB_URL }}
          SUPABASE_DEV_REF: ${{ secrets.SUPABASE_DEV_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # The dev project's DIRECT endpoint (db.<ref>.supabase.co) is IPv6-ONLY and GitHub
      # runners are IPv4-only, so the first run died with "Network is unreachable". The
      # session pooler is IPv4-reachable, but its hostname prefix varies per project and no
      # CLI exposes it — so the URL is derived and probed here.
      #
      # Done in CI rather than by hand-editing the secret so the password stays inside the
      # secret: never fetched, never pasted. The derived URL is masked immediately, because
      # Actions masks the secret's exact value and would NOT mask a string derived from it.
      - name: Resolve a reachable database URL
        run: |
          URL="$(bash scripts/resolve-db-url.sh "$SUPABASE_DEV_DB_URL" ap-south-1)"
          echo "::add-mask::$URL"
          echo "DB_URL=$URL" >> "$GITHUB_ENV"
        env:
          SUPABASE_DEV_DB_URL: ${{ secrets.SUPABASE_DEV_DB_URL }}

      - name: Apply migrations
        run: bash scripts/migrate.sh "$DB_URL"

      # Same seed staging uses: `on conflict do nothing` throughout, so re-running is safe.
      # Structure only — reviewer-approved content arrives via SVC_content_ingest.
      - name: Seed dev data
        if: ${{ inputs.seed }}
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f apps/backend/seed/seed.sql

      # Proves the schema actually landed, rather than trusting a zero exit code.
      - name: Verify schema
        run: |
          COUNT=$(psql "$DB_URL" -tAc "select count(*) from information_schema.tables where table_schema='public';")
          echo "public tables: $COUNT"
          if [ "$COUNT" -lt 20 ]; then
            echo "::error::Only $COUNT tables in public schema — migrations did not apply as expected."
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Dev migrate + seed: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Seed applied: ${{ inputs.seed }}" >> "$GITHUB_STEP_SUMMARY"
