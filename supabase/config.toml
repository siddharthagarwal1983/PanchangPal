# =============================================================================
# supabase/config.toml
# Supabase CLI configuration. The CLI requires this file to live at
# ./supabase/config.toml, but the PROJECT SOURCES (migrations, seed, functions)
# live under apps/backend/ per the authoritative repo layout in
# TDD Part 1 §4 and TDD Part 2 §6.1 (source-of-truth hierarchy: TDD > Playbook/Tasks).
#
# Resolution of the flagged migration-location discrepancy (decision 2026-07-12):
#   - Migrations:  apps/backend/migrations/   (applied by CI, TDD Part 1 §2.4)
#   - Seed:        apps/backend/seed/seed.sql (wired below via db.seed.sql_paths)
#   - Functions:   apps/backend/functions/    (SVC_*, added in a later task)
#
# Local `supabase db reset` uses the seed path below. Migrations are applied in
# CI (GitHub Actions) from apps/backend/migrations in lexical order; a local dev
# convenience script may symlink apps/backend/migrations → supabase/migrations.
# =============================================================================

project_id = "panchangpal"

[db]
# Single US region for launch (ADR-012). Local shadow DB for migration diffing.
major_version = 15

[db.seed]
# MUST stay false while migrations live outside the CLI's path (schema_paths = [] below).
# `supabase start` seeds immediately after initialising an EMPTY schema, so with the
# migrations unapplied the seed hits a missing table ("relation \"tradition\" does not
# exist") and the whole stack rolls back. The CLI cannot order them correctly here.
# Local bring-up order is therefore explicit:
#   1. supabase start
#   2. scripts/migrate.sh "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
#   3. psql "<same url>" -f apps/backend/seed/seed.sql
enabled = false
# Seed path is relative to this supabase/ directory.
sql_paths = ["../apps/backend/seed/seed.sql"]

[db.migrations]
# Migration files live under apps/backend/migrations (TDD §4/§6.1). CI applies them;
# see scripts/ and .github/ (CI/CD task). Kept out of the CLI default supabase/migrations
# intentionally to honor the TDD repository layout.
schema_paths = []

[auth]
enabled = true
# Deferred + anonymous-first auth (UX-2 / ADR-009): app/index.tsx bootstraps by restoring
# or creating an ANONYMOUS session before any screen renders, so local dev is unusable
# without this enabled — the CLI defaults it to false.
enable_anonymous_sign_ins = true

# =============================================================================
# Edge Functions (SVC_*). Sources live under apps/backend/functions per the repo
# layout above, but the Supabase CLI resolves functions from ./supabase/functions
# by default. Each function is therefore declared explicitly with an `entrypoint`
# (path relative to this supabase/ directory) and the monorepo `import_map`
# (apps/backend/deno.json → @panchangpal/shared, @panchangpal/ai, supabase-js).
# `_shared` is a shared library, not a function, so it is not declared.
# NOTE: verify_jwt defaults to true. revenuecat-webhook is called by RevenueCat
# (no Supabase JWT) — set verify_jwt = false for it once the webhook is wired.
# =============================================================================

[functions.account]
entrypoint = "../apps/backend/functions/account/index.ts"
import_map = "../apps/backend/deno.json"

[functions.ask-guru]
entrypoint = "../apps/backend/functions/ask-guru/index.ts"
import_map = "../apps/backend/deno.json"

[functions.content-ingest]
entrypoint = "../apps/backend/functions/content-ingest/index.ts"
import_map = "../apps/backend/deno.json"

[functions.notify-scheduler]
entrypoint = "../apps/backend/functions/notify-scheduler/index.ts"
import_map = "../apps/backend/deno.json"

[functions.panchang]
entrypoint = "../apps/backend/functions/panchang/index.ts"
import_map = "../apps/backend/deno.json"

[functions.revenuecat-webhook]
entrypoint = "../apps/backend/functions/revenuecat-webhook/index.ts"
import_map = "../apps/backend/deno.json"

[functions.sync]
entrypoint = "../apps/backend/functions/sync/index.ts"
import_map = "../apps/backend/deno.json"
